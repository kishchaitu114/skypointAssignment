# GCP CI/CD — Workload Identity Federation (no JSON keys in git).
# Prerequisites: GitHub OIDC pool + provider, WIF SA with roles for AR, Cloud Run, TF state.
name: GCP CI

on:
  push:
    branches: [main]
    paths:
      - "gcp/**"
      - "main.py"
      - "Dockerfile"
      - "requirements.txt"
      - "tests/**"
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  TF_DIR: gcp/terraform
  IMAGE_NAME: healthcare-app
  AR_REGION: us-central1

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest semgrep pip-audit checkov
          pip install -r requirements.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Unit tests (pytest)
        run: pytest -q
      - name: SAST (semgrep)
        run: semgrep --config auto --error .
      - name: Dependency scan (pip-audit)
        run: pip-audit --requirement requirements.txt --progress=off
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"
      - name: Terraform fmt and validate
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false
          terraform validate
      - name: IaC scan (tfsec — blocks CRITICAL)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: gcp/terraform
          additional_args: --minimum-severity CRITICAL
      - name: IaC scan (checkov — advisory)
        run: checkov -d gcp/terraform --quiet --compact || true
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
      - name: AI PR review (non-blocking)
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin main --depth=50 || true
          git diff origin/main...HEAD > /tmp/pr.diff || true
          python gcp/scripts/ai_pr_review.py < /tmp/pr.diff || true

  build-and-push:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.AR_REGION }}-docker.pkg.dev --quiet
      - name: Build image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} -f Dockerfile .
      - name: Push (Git SHA + semver)
        env:
          AR_REPO: ${{ vars.GCP_AR_REPO }}
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          SEMVER="1.0.${{ github.run_number }}"
          IMAGE_BASE="${{ env.AR_REGION }}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${IMAGE_NAME}"
          docker tag $IMAGE_NAME:${{ github.sha }} "$IMAGE_BASE:${{ github.sha }}"
          docker tag $IMAGE_NAME:${{ github.sha }} "$IMAGE_BASE:$SEMVER"
          docker push "$IMAGE_BASE:${{ github.sha }}"
          docker push "$IMAGE_BASE:$SEMVER"
      - name: Container scan (Trivy)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.AR_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          severity: CRITICAL
          ignore-unfixed: "true"
          exit-code: "1"

  terraform-plan:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SA_EMAIL }}
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform plan (dev)
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.GCP_TFSTATE_BUCKET }}" \
            -backend-config="prefix=healthcare/gcp/dev"
          terraform plan -var-file=environments/dev.tfvars -no-color -out=tfplan
        env:
          TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}

  deploy-dev:
    needs: terraform-plan
    runs-on: ubuntu-latest
    environment: gcp-dev
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy Cloud Run (dev)
        env:
          SERVICE: healthcare-api-dev
          REGION: us-central1
          AR_REPO: ${{ vars.GCP_AR_REPO }}
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          IMAGE="${{ env.AR_REGION }}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          gcloud run services update "$SERVICE" --region="$REGION" --image="$IMAGE" --quiet || \
            echo "Service update skipped if Terraform owns lifecycle (plan-only mode)."

  deploy-prod:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: gcp-prod
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy Cloud Run (prod)
        env:
          SERVICE: healthcare-api-prod
          REGION: us-central1
        run: |
          echo "Prod deploy gated by GitHub Environment approval (gcp-prod)."
