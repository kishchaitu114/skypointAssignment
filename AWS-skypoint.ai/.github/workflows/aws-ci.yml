# AWS CI/CD — GitHub OIDC (no long-lived access keys in git).
name: AWS CI

on:
  push:
    branches: [main]
    paths:
      - "aws/**"
      - "main.py"
      - "Dockerfile"
      - "requirements.txt"
      - "tests/**"
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  TF_DIR: aws/terraform
  IMAGE_NAME: healthcare-app
  AWS_REGION: us-east-1

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest semgrep pip-audit checkov
          pip install -r requirements.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Unit tests (pytest)
        run: pytest -q
      - name: SAST (semgrep)
        run: semgrep --config auto --error .
      - name: Dependency scan (pip-audit)
        run: pip-audit --requirement requirements.txt --progress=off
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt and validate
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false
          terraform validate
      - name: IaC scan (tfsec)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: aws/terraform
          additional_args: --minimum-severity CRITICAL
      - name: IaC scan (checkov)
        run: checkov -d aws/terraform --quiet --compact || true
      - name: Secret scan (trufflehog)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
        continue-on-error: true
      - name: AI PR review
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin main --depth=50 || true
          git diff origin/main...HEAD > /tmp/pr.diff || true
          python aws/scripts/ai_pr_review.py < /tmp/pr.diff || true

  build-and-push:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          ECR_REPO: ${{ vars.AWS_ECR_REPOSITORY }}
        run: |
          SEMVER="1.0.${{ github.run_number }}"
          docker build -f Dockerfile -t $IMAGE_NAME:${{ github.sha }} .
          docker tag $IMAGE_NAME:${{ github.sha }} $ECR_REGISTRY/$ECR_REPO:${{ github.sha }}
          docker tag $IMAGE_NAME:${{ github.sha }} $ECR_REGISTRY/$ECR_REPO:$SEMVER
          docker push $ECR_REGISTRY/$ECR_REPO:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPO:$SEMVER
      - name: Container scan (Trivy)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.ecr.outputs.registry }}/${{ vars.AWS_ECR_REPOSITORY }}:${{ github.sha }}
          severity: CRITICAL
          ignore-unfixed: "true"
          exit-code: "1"

  terraform-plan:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform plan (dev)
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.AWS_TFSTATE_BUCKET }}" \
            -backend-config="key=healthcare/aws/dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.AWS_TFSTATE_LOCK_TABLE }}"
          terraform plan -var-file=environments/dev.tfvars -no-color -out=tfplan

  deploy-dev:
    needs: terraform-plan
    runs-on: ubuntu-latest
    environment: aws-dev
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
      - name: Setup Helm
        uses: azure/setup-helm@v4
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ vars.AWS_EKS_CLUSTER_DEV }} --region ${{ env.AWS_REGION }}
      - name: Helm deploy (dev)
        run: |
          helm upgrade --install healthcare-app aws/charts/healthcare-app \
            --namespace healthcare-dev --create-namespace \
            --set image.repository=${{ vars.AWS_ECR_REGISTRY }}/healthcare-app \
            --set image.tag=${{ github.sha }} \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=${{ vars.AWS_APP_IRSA_ROLE_ARN_DEV }} \
            --set aws.secretsManager.secretName=healthcare/database-url-dev \
            || { helm rollback healthcare-app -n healthcare-dev || true; exit 1; }

  deploy-prod:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: aws-prod
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
      - name: Setup Helm
        uses: azure/setup-helm@v4
      - name: Helm deploy (prod)
        run: |
          aws eks update-kubeconfig --name ${{ vars.AWS_EKS_CLUSTER_PROD }} --region ${{ env.AWS_REGION }}
          helm upgrade --install healthcare-app aws/charts/healthcare-app \
            --namespace healthcare-prod --create-namespace \
            --set image.repository=${{ vars.AWS_ECR_REGISTRY }}/healthcare-app \
            --set image.tag=${{ github.sha }} \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=${{ vars.AWS_APP_IRSA_ROLE_ARN_PROD }} \
            --set aws.secretsManager.secretName=healthcare/database-url-prod \
            || { helm rollback healthcare-app -n healthcare-prod || true; exit 1; }
